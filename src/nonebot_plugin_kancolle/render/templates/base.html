{# 基础模板：所有 panel 都继承它。
   主题（dark/light）通过 body class 切换 CSS 变量。
   800px 宽是设计基线；纵向由内容决定，截图走 full_page。 #}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{% endblock %}</title>
  <style>
    /* === 主题变量 === */
    :root {
      --bg:            #1a1d24;
      --card-bg:       #252932;
      --fg:            #e8eaed;
      --fg-dim:        #a0a4ad;
      --fg-muted:      #6b7075;
      --accent:        #5b9eff;
      --bar-base:      #5b9eff;
      --bar-max:       #ffb04a;
      --bar-bg:        rgba(255, 255, 255, 0.06);
      --success:       #4ade80;
      --danger:        #f87171;
      --border:        rgba(255, 255, 255, 0.08);
      --row-stripe:    rgba(255, 255, 255, 0.02);
    }
    body.theme-light {
      --bg:            #f5f5f7;
      --card-bg:       #ffffff;
      --fg:            #1d1f23;
      --fg-dim:        #4b5057;
      --fg-muted:      #8a8f95;
      --accent:        #2563eb;
      --bar-base:      #2563eb;
      --bar-max:       #ea580c;
      --bar-bg:        rgba(0, 0, 0, 0.05);
      --success:       #16a34a;
      --danger:        #dc2626;
      --border:        rgba(0, 0, 0, 0.08);
      --row-stripe:    rgba(0, 0, 0, 0.02);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei",
                   "PingFang SC", "Noto Sans CJK SC",
                   "Source Han Sans CN", sans-serif;
      font-size: 16px;
      line-height: 1.4;
    }
    body {
      width: 800px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
    }

    /* === 通用元素 === */
    .stype-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .stype-badge em {
      font-style: normal;
      margin-left: 4px;
      opacity: 0.85;
    }
    .meta-dim { color: var(--fg-muted); font-size: 0.85em; }

    .stat-row {
      display: grid;
      grid-template-columns: 56px 1fr 110px;
      gap: 12px;
      align-items: center;
      padding: 5px 0;
    }
    .stat-row:nth-child(even) { background: var(--row-stripe); }
    .stat-row.missing { opacity: 0.5; }

    .stat-label {
      color: var(--fg-dim);
      font-size: 0.95em;
    }
    .stat-bars {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .bar-track {
      position: relative;
      height: 6px;
      background: var(--bar-bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 3px;
    }
    .bar-fill.base { background: var(--bar-base); }
    .bar-fill.max  { background: var(--bar-max); opacity: 0.55; }

    .stat-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--fg);
      font-size: 0.95em;
    }
    .stat-value .arrow { color: var(--fg-muted); margin: 0 4px; }
    .stat-value .max-only { color: var(--fg-dim); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="theme-{{ theme }}">
  {% block content %}{% endblock %}
</body>
</html>
